<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Templates | TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .t-card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .t-card:hover { border-color: #2563eb; }
    </style>
</head>
<body class="p-8">
    <div class="flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black italic">TRUELINE <span class="text-blue-500">LIB</span></h1>
        <button onclick="window.location.href='index.html'" class="text-gray-500 text-sm">Close</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
        <div class="t-card aspect-[9/16] relative flex flex-col justify-end p-4">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent"></div>
            <p class="relative text-[10px] font-bold text-blue-400">#Trending</p>
            <p class="relative text-xs font-bold truncate">Cinematic Flow</p>
            <button onclick="window.location.href='dashboard.html'" class="relative mt-2 bg-white text-black py-2 rounded text-[10px] font-black uppercase">Use</button>
        </div>
        </div>
</body>
</html>
