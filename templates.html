<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates | TRUELINE Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .template-card { background: #111; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .template-card:hover { border-color: #2563eb; transform: translateY(-5px); }
    </style>
</head>
<body class="pb-20">
    <nav class="p-6 flex justify-between items-center border-b border-white/5">
        <div onclick="window.location.href='index.html'" class="text-2xl font-black text-blue-500 cursor-pointer">TRUELINE</div>
        <button onclick="window.location.href='dashboard.html'" class="text-sm font-bold bg-white/10 px-5 py-2 rounded-full hover:bg-white/20 transition">Dashboard</button>
    </nav>

    <div class="max-w-7xl mx-auto px-6 pt-12">
        <h1 class="text-4xl font-black mb-8">Template Library</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="template-card aspect-[9/16] relative flex flex-col justify-end p-4">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                <p class="relative text-sm font-bold">Cinematic Vlog</p>
                <button onclick="window.location.href='dashboard.html'" class="relative mt-2 bg-blue-600 text-[10px] font-bold py-2 rounded">USE TEMPLATE</button>
            </div>
            <div class="template-card aspect-[9/16] relative flex flex-col justify-end p-4 bg-blue-900/10">
                <div class="absolute inset-0 bg-gradient-to-t from-black to-transparent"></div>
                <p class="relative text-sm font-bold">Dynamic Ads</p>
                <button onclick="window.location.href='dashboard.html'" class="relative mt-2 bg-blue-600 text-[10px] font-bold py-2 rounded">USE TEMPLATE</button>
            </div>
        </div>
    </div>
</body>
</html>
