<!DOCTYPE html>
<html>
<head>
  <title>Trueline Dashboard</title>
</head>
<body style="font-family:Arial;">

  <h2>📁 Dashboard</h2>

  <button onclick="createProject()">+ Buat Project</button>

  <ul id="list"></ul>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    import {
      getFirestore,
      collection,
      addDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAWqV29Xz1I4P0lYYEFzt1QV9wcUhfGqxM",
      authDomain: "trueline-19ae3.firebaseapp.com",
      projectId: "trueline-19ae3",
      storageBucket: "trueline-19ae3.firebasestorage.app",
      messagingSenderId: "753238069219",
      appId: "1:753238069219:web:e182d8aec00e5843fe5ad6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let user;

    onAuthStateChanged(auth, (u) => {
      if (!u) window.location.href = "index.html";
      user = u;
      loadProjects();
    });

    window.createProject = async () => {
      const docRef = await addDoc(collection(db, "projects"), {
        uid: user.uid,
        name: "New Project",
        frames: []
      });

      openEditor(docRef.id);
    };

    async function loadProjects() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      const snap = await getDocs(collection(db, "projects"));

      snap.forEach(doc => {
        if (doc.data().uid === user.uid) {
          let li = document.createElement("li");
          li.innerHTML = `
            ${doc.data().name}
            <button onclick="openEditor('${doc.id}')">Edit</button>
          `;
          list.appendChild(li);
        }
      });
    }

    window.openEditor = (id) => {
      window.location.href = "editor.html?id=" + id;
    };
  </script>

</body>
</html>
