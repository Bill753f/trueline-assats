<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-[#161616] border-r border-white/5 p-6 flex flex-col">
        <div class="text-2xl font-black text-indigo-500 mb-10">TRUELINE</div>
        <nav class="space-y-2 flex-1 text-sm font-bold">
            <a href="#" class="flex items-center space-x-3 bg-indigo-600 px-4 py-3 rounded-xl text-white"><span>🏠</span> <span>Dashboard</span></a>
            <a href="#" class="flex items-center space-x-3 hover:bg-white/5 px-4 py-3 rounded-xl text-gray-400"><span>🎬</span> <span>Proyek AI</span></a>
            <a href="#" class="flex items-center space-x-3 hover:bg-white/5 px-4 py-3 rounded-xl text-gray-400"><span>🎵</span> <span>Audio</span></a>
        </nav>
        <div class="p-4 bg-white/5 rounded-2xl text-[10px]">
            <p class="text-gray-500 mb-2 uppercase">Storage Pribadi</p>
            <div class="w-full bg-white/10 h-1.5 rounded-full mb-2"><div class="bg-indigo-500 h-full w-[10%]"></div></div>
            <p class="text-gray-400 italic">5 / 50 Video</p>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black">Panel Kreator 🚀</h1>
            <button onclick="window.location.href='index.html'" class="text-xs text-gray-500 hover:text-white">Keluar</button>
        </div>
        <div class="glass p-10 rounded-[2.5rem] border-indigo-500/20 text-center">
            <h2 class="text-xl font-bold mb-4 text-indigo-400">Belum ada proyek AI?</h2>
            <p class="text-gray-500 text-sm mb-6">Pilih template premium sekarang dan mulai merender video pertama kamu.</p>
            <button class="bg-white text-black px-6 py-3 rounded-xl font-black">+ Buat Video Baru</button>
        </div>
    </main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  // Ganti dengan URL & Key dari Dashboard Supabase kamu (Menu Settings > API)
  const supabaseUrl = 'URL_SUPABASE_KAMU'
  const supabaseKey = 'ANON_KEY_KAMU'
  const supabase = supabase.createClient(supabaseUrl, supabaseKey)

  async function uploadFile(event) {
    const file = event.target.files[0]
    if (!file) return;

    const fileName = `${Date.now()}_${file.name}`
    
    const { data, error } = await supabase.storage
      .from('aset-user')
      .upload(fileName, file)

    if (error) {
        alert('Gagal upload: ' + error.message)
    } else {
        alert('Berhasil upload! File tersimpan di gudang.')
    }
  }

  // Hubungkan ke tombol upload di dashboard kamu
  // Tambahkan id="file-input" pada tag <input type="file"> kamu
</script>
</body>
</html>
