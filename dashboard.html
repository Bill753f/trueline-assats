<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TRUELINE Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .sidebar-item { transition: all 0.2s; border-radius: 8px; }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); }
        .sidebar-item.active { background: #2563eb; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 border-r border-white/5 flex flex-col p-4 hidden md:flex">
        <div class="text-xl font-black tracking-tighter text-blue-500 mb-10 px-2">TRUELINE</div>
        
        <nav class="flex-1 space-y-1">
            <a href="#" class="sidebar-item active flex items-center space-x-3 px-4 py-3 text-sm font-semibold">
                <span>🏠</span> <span>Home</span>
            </a>
            <a href="#" class="sidebar-item flex items-center space-x-3 px-4 py-3 text-sm font-medium text-gray-400">
                <span>🎨</span> <span>My Projects</span>
            </a>
            <a href="#" class="sidebar-item flex items-center space-x-3 px-4 py-3 text-sm font-medium text-gray-400">
                <span>☁️</span> <span>Cloud Storage</span>
            </a>
        </nav>

        <div class="mt-auto pt-4 border-t border-white/5">
            <button onclick="window.location.href='index.html'" class="sidebar-item flex items-center space-x-3 px-4 py-3 text-sm font-medium text-red-400 w-full">
                <span>🚪</span> <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold">Welcome back, Creator</h2>
                <p class="text-gray-500 text-sm">Ayo buat sesuatu yang luar biasa hari ini.</p>
            </div>
            <button class="bg-blue-600 hover:bg-blue-500 px-6 py-2.5 rounded-lg font-bold text-sm transition shadow-lg shadow-blue-600/20">
                + Create New Project
            </button>
        </div>

        <div class="glass-panel rounded-2xl p-8 mb-10 flex items-center justify-between bg-gradient-to-r from-blue-900/20 to-transparent">
            <div>
                <h3 class="text-xl font-bold mb-2">Upgrade to Founder Pro</h3>
                <p class="text-gray-400 text-sm max-w-md">Dapatkan akses ke fitur AI Orchestrator v2.0 dan cloud storage tanpa batas.</p>
            </div>
            <button class="bg-white text-black px-6 py-2 rounded-lg font-bold text-sm">Upgrade</button>
        </div>

        <h3 class="text-lg font-bold mb-4">Recent Projects</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <div class="group cursor-pointer">
                <div class="aspect-video bg-[#1a1a1a] rounded-xl mb-3 border border-white/5 group-hover:border-blue-500 transition flex items-center justify-center overflow-hidden">
                    <span class="text-gray-700 font-bold">PREVIEW</span>
                </div>
                <p class="text-sm font-semibold truncate">Cinematic_Edit_01.mp4</p>
                <p class="text-[11px] text-gray-500 uppercase">2 hours ago</p>
            </div>

            <div class="aspect-video border-2 border-dashed border-white/5 rounded-xl flex flex-col items-center justify-center text-gray-600 hover:text-blue-500 hover:border-blue-500/50 cursor-pointer transition">
                <span class="text-2xl mb-1">+</span>
                <span class="text-xs font-bold uppercase tracking-widest">New File</span>
            </div>
        </div>
    </main>
<input type="file" id="hidden-file-input" class="hidden" accept="video/*,audio/*,image/*" onchange="updateProjectList(event)">

<script>
    // 1. Hubungkan tombol biru "Create New Project" ke Input File
    document.addEventListener('DOMContentLoaded', () => {
        const createBtn = document.querySelector('button.bg-blue-600');
        const fileInput = document.getElementById('hidden-file-input');

        if (createBtn && fileInput) {
            createBtn.onclick = () => fileInput.click();
        }
    });

    // 2. Fungsi untuk menampilkan nama file yang baru diupload ke daftar
    function updateProjectList(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Ambil wadah (grid) tempat proyek berada
        const projectGrid = document.querySelector('.grid');
        
        // Buat tampilan kartu proyek baru
        const newProject = document.createElement('div');
        newProject.className = "group cursor-pointer animate-pulse";
        newProject.innerHTML = `
            <div class="aspect-video bg-blue-900/20 rounded-xl mb-3 border border-blue-500/50 flex items-center justify-center overflow-hidden">
                <span class="text-blue-400 text-[10px] font-bold uppercase tracking-widest text-center px-2">${file.name}</span>
            </div>
            <p class="text-sm font-semibold truncate text-blue-400">${file.name}</p>
            <p class="text-[11px] text-gray-500 uppercase">Just Now</p>
        `;

        // Masukkan ke urutan pertama di grid
        projectGrid.prepend(newProject);

        // Berhenti animasi pulse setelah 2 detik (ceritanya simulasi loading)
        setTimeout(() => {
            newProject.classList.remove('animate-pulse');
        }, 2000);

        alert("File '" + file.name + "' berhasil dipilih! (Simulasi Upload)");
    }
</script>
</body>
</html>
