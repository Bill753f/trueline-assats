<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CapCut Style Dashboard | TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #f5f5f5; font-family: 'Inter', sans-serif; }
        .sidebar { background-color: #000000; width: 240px; border-right: 1px solid #222; }
        .active-nav { background-color: #1a1a1a; color: #2563eb; border-left: 3px solid #2563eb; }
        .project-card { background-color: #1a1a1a; border-radius: 8px; overflow: hidden; transition: 0.2s; border: 1px solid transparent; }
        .project-card:hover { border-color: #333; transform: scale(1.02); }
        .btn-primary { background-color: #2563eb; transition: 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar flex flex-col h-full py-6">
        <div class="px-6 mb-10">
            <h1 class="text-xl font-black tracking-tighter italic text-white">TRUELINE</h1>
        </div>
        
        <nav class="flex-1 space-y-1">
            <div class="active-nav px-6 py-3 flex items-center space-x-3 cursor-pointer">
                <span class="text-lg">🏠</span>
                <span class="text-sm font-semibold">Home</span>
            </div>
            <div onclick="window.location.href='templates.html'" class="px-6 py-3 flex items-center space-x-3 text-gray-400 hover:bg-[#1a1a1a] cursor-pointer transition">
                <span class="text-lg">🎞️</span>
                <span class="text-sm font-semibold">Templates</span>
            </div>
            <div class="px-6 py-3 flex items-center space-x-3 text-gray-400 hover:bg-[#1a1a1a] cursor-pointer transition">
                <span class="text-lg">📁</span>
                <span class="text-sm font-semibold">Cloud Space</span>
            </div>
        </nav>

        <div class="px-6 mt-auto">
            <div class="bg-[#1a1a1a] p-4 rounded-xl border border-[#333]">
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-1">Founder Version</p>
                <p class="text-[11px] text-gray-400 mb-3">Nikmati fitur AI orchestrator tanpa batas.</p>
                <button class="w-full bg-white text-black py-2 rounded-lg text-[11px] font-extrabold hover:bg-gray-200 transition">MANAGE SUBS</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#0f0f0f]">
        <header class="flex justify-between items-center px-10 py-6 sticky top-0 bg-[#0f0f0f]/80 backdrop-blur-md z-10">
            <h2 class="text-xl font-bold">New Project</h2>
            <div class="flex items-center space-x-4">
                <button id="upBtn" class="btn-primary px-6 py-2 rounded-lg text-sm font-bold flex items-center space-x-2">
                    <span>+</span> <span>New Project</span>
                </button>
                <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">T</div>
            </div>
        </header>

        <div class="px-10 pb-20">
            <div class="w-full h-44 bg-gradient-to-r from-blue-900/40 to-purple-900/40 rounded-2xl mb-10 flex items-center px-10 border border-white/5">
                <div>
                    <h3 class="text-2xl font-black mb-2 leading-tight">Mulai Kreasi Riset <br>Aset Kamu Disini.</h3>
                    <p class="text-sm text-gray-300">Gunakan tools otomatis untuk mempercepat workflow.</p>
                </div>
            </div>

            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-6">Recent Work</h3>
            <div id="projectGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <div onclick="document.getElementById('fileInput').click()" class="project-card aspect-video border-2 border-dashed border-[#333] flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 group transition">
                    <span class="text-2xl text-gray-600 group-hover:text-blue-500 mb-1">+</span>
                    <span class="text-[10px] font-bold text-gray-600 group-hover:text-blue-500 uppercase">Create</span>
                </div>
            </div>
        </div>
    </main>

    <input type="file" id="fileInput" class="hidden" onchange="addFile(event)">

    <script>
        const upBtn = document.getElementById('upBtn');
        const fileInput = document.getElementById('fileInput');
        const grid = document.getElementById('projectGrid');

        upBtn.onclick = () => fileInput.click();

        function addFile(e) {
            const f = e.target.files[0];
            if(!f) return;
            
            const card = document.createElement('div');
            card.className = "project-card";
            card.innerHTML = `
                <div class="aspect-video bg-[#222] mb-3 relative overflow-hidden flex items-center justify-center">
                   <div class="absolute inset-0 bg-blue-900/10"></div>
                   <span class="text-[8px] font-bold text-blue-500 uppercase tracking-[0.2em]">Processing...</span>
                </div>
                <div class="px-3 pb-3">
                    <p class="text-[11px] font-bold truncate mb-1">${f.name}</p>
                    <p class="text-[9px] text-gray-500 uppercase">Just Now • 00:15</p>
                </div>
            `;
            grid.prepend(card);
        }
    </script>
</body>
</html>
