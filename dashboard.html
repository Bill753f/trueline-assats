<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <aside class="w-64 border-r border-white/5 p-4 flex flex-col">
        <div class="text-xl font-black text-blue-500 mb-10">TRUELINE</div>
        <nav class="flex-1 space-y-2">
            <a href="index.html" class="block px-4 py-2 text-sm text-gray-400 hover:text-white">Home</a>
            <a href="templates.html" class="block px-4 py-2 text-sm text-gray-400 hover:text-white">Templates</a>
        </nav>
        <button onclick="window.location.href='index.html'" class="text-red-400 text-sm p-4 border-t border-white/5">Sign Out</button>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold">Creator Dashboard</h2>
            <button id="uploadBtn" class="bg-blue-600 px-6 py-2 rounded-lg font-bold text-sm">+ Create Project</button>
        </div>

        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="aspect-video border-2 border-dashed border-white/5 rounded-xl flex items-center justify-center text-gray-600">
                Empty Project
            </div>
        </div>
    </main>

    <input type="file" id="fileInput" class="hidden" onchange="handleUpload(event)">

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const projectGrid = document.getElementById('projectGrid');

        uploadBtn.onclick = () => fileInput.click();

        function handleUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            const card = document.createElement('div');
            card.className = "bg-white/5 p-4 rounded-xl border border-blue-500/30";
            card.innerHTML = `<div class='aspect-video bg-blue-900/20 mb-2 rounded'></div><p class='text-xs truncate'>${file.name}</p>`;
            projectGrid.prepend(card);
            alert("Berhasil!");
        }
    </script>
</body>
</html>
