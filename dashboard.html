<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUELINE | Ultra-Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top left, #0f172a, #020617); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }
        .sidebar { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.05); }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover { 
            background: rgba(255, 255, 255, 0.07); 
            border-color: #3b82f6;
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }
        .neo-btn {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
            transition: 0.3s;
        }
        .neo-btn:hover { transform: scale(1.05); box-shadow: 0 15px 30px -5px rgba(59, 130, 246, 0.6); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar w-20 md:w-64 flex flex-col py-8">
        <div class="px-8 mb-12">
            <h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">TRUELINE</h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <div class="flex items-center space-x-4 px-4 py-3 rounded-xl bg-white/10 text-blue-400 border border-white/10">
                <span class="text-xl">⚡</span>
                <span class="text-sm font-bold hidden md:block">Studio</span>
            </div>
            <div onclick="window.location.href='templates.html'" class="flex items-center space-x-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-white/5 hover:text-white transition cursor-pointer">
                <span class="text-xl">💎</span>
                <span class="text-sm font-bold hidden md:block">Templates</span>
            </div>
            <div class="flex items-center space-x-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-white/5 hover:text-white transition cursor-pointer">
                <span class="text-xl">🔒</span>
                <span class="text-sm font-bold hidden md:block">Vault</span>
            </div>
        </nav>

        <div class="px-4 mt-auto">
            <div class="bg-gradient-to-br from-indigo-600/20 to-purple-600/20 p-5 rounded-2xl border border-white/10">
                <div class="flex items-center space-x-2 mb-3">
                    <div class="status-dot"></div>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-blue-300">Founder Mode</span>
                </div>
                <button class="w-full py-2 bg-white text-black rounded-lg text-[10px] font-black hover:bg-blue-400 transition">SYSTEM PANEL</button>
            </div>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto px-6 md:px-12 py-10">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-3xl font-extrabold tracking-tight">Creative <span class="text-blue-500">Workspace</span></h2>
                <p class="text-gray-500 text-sm mt-1">Sistem orkestrasi aset produksi level industri.</p>
            </div>
            <div class="flex items-center space-x-6">
                <div class="hidden md:block text-right">
                    <p class="text-xs font-bold">Founder User</p>
                    <p class="text-[10px] text-green-500 font-mono tracking-widest uppercase">Verified Account</p>
                </div>
                <button id="mainUpBtn" class="neo-btn px-8 py-3 rounded-2xl font-bold text-sm tracking-wide">
                    + NEW ASSET
                </button>
            </div>
        </header>

        <div id="pGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div onclick="document.getElementById('fileIn').click()" class="glass-card aspect-video rounded-3xl flex flex-col items-center justify-center cursor-pointer border-dashed border-2 border-white/10 group">
                <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-blue-500/20 transition mb-3">
                    <span class="text-2xl text-gray-500 group-hover:text-blue-400">+</span>
                </div>
                <span class="text-[10px] font-black text-gray-500 group-hover:text-blue-400 uppercase tracking-[0.3em]">Initialize</span>
            </div>
        </div>
    </main>

    <input type="file" id="fileIn" class="hidden" onchange="createAsset(event)">

    <script>
        function createAsset(e) {
            const f = e.target.files[0];
            if(!f) return;
            
            const card = document.createElement('div');
            card.className = "glass-card aspect-video rounded-3xl p-6 flex flex-col justify-end relative overflow-hidden group";
            card.innerHTML = `
                <div class="absolute top-4 right-4 bg-blue-500 text-[8px] font-black px-2 py-1 rounded">PROCESSING</div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="relative">
                    <h4 class="text-sm font-bold truncate mb-1">${f.name}</h4>
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] text-gray-500 uppercase font-mono italic">Ready to Orchestrate</span>
                        <span class="text-[10px] font-bold text-blue-400 tracking-tighter">0.00s</span>
                    </div>
                </div>
            `;
            document.getElementById('pGrid').prepend(card);
        }
        document.getElementById('mainUpBtn').onclick = () => document.getElementById('fileIn').click();
    </script>
</body>
</html>
