<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .sidebar { background: #000; border-right: 1px solid #1a1a1a; }
        .main-panel { background: #0a0a0a; }
        .btn-blue { background: #2563eb; box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="flex h-screen">
    <aside class="w-64 sidebar flex flex-col p-6">
        <div class="text-2xl font-black italic mb-12">TRUELINE</div>
        <nav class="flex-1 space-y-4">
            <a href="index.html" class="block text-gray-400 hover:text-white font-medium">Home</a>
            <a href="templates.html" class="block text-blue-500 font-bold">Templates</a>
            <a href="#" class="block text-gray-400 hover:text-white font-medium">My Projects</a>
        </nav>
        <div class="mt-auto bg-gradient-to-br from-blue-900/40 to-purple-900/40 p-4 rounded-xl border border-white/10">
            <p class="text-[10px] font-bold text-blue-400 uppercase mb-1">Founder Plan</p>
            <p class="text-[11px] text-gray-300 mb-3">Dapatkan akses ke fitur premium.</p>
            <button class="w-full bg-white text-black py-2 rounded-lg text-[10px] font-bold">UPGRADE</button>
        </div>
    </aside>

    <main class="flex-1 main-panel p-10 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black">Creator Panel</h2>
            <button id="upBtn" class="btn-blue px-8 py-3 rounded-xl font-bold text-sm">+ New Project</button>
        </div>

        <div id="g" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="aspect-video border border-dashed border-white/10 rounded-2xl flex items-center justify-center text-gray-600 text-xs font-bold uppercase tracking-widest italic">
                Ready to Create
            </div>
        </div>
    </main>

    <input type="file" id="fi" class="hidden" onchange="h(event)">
    <script>
        const b = document.getElementById('upBtn'), i = document.getElementById('fi'), g = document.getElementById('g');
        b.onclick = () => i.click();
        function h(e) {
            const f = e.target.files[0]; if(!f) return;
            const c = document.createElement('div');
            c.className = "bg-[#111] p-4 rounded-2xl border border-blue-500/30";
            c.innerHTML = `<div class='aspect-video bg-blue-900/10 mb-3 rounded-lg'></div><p class='text-[11px] font-bold truncate text-blue-400'>${f.name}</p>`;
            g.prepend(c);
        }
    </script>
</body>
</html>
