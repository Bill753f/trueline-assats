<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TRUELINE OS v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-black select-none">

    <div class="grid grid-cols-[80px_300px_1fr_320px] h-screen">
        <aside class="flex flex-col items-center py-6 border-r border-white/5 bg-[#010101]">
            <div class="w-10 h-10 bg-white rounded-xl mb-10 flex items-center justify-center text-black font-bold">T</div>
            <button id="btn-assets" class="p-4 text-zinc-500 hover:text-white">📁</button>
            <button id="btn-settings" class="p-4 text-zinc-500 hover:text-white">⚙️</button>
        </aside>

        <section class="glass-panel p-6 border-r border-white/5">
            <h2 class="text-[10px] font-bold text-zinc-500 uppercase mb-6 tracking-tighter">Media Assets</h2>
            <div class="space-y-3">
                <div class="p-3 bg-white/5 rounded-lg border border-white/5 text-xs">Project_Intro.mp4</div>
            </div>
        </section>

        <main class="flex flex-col overflow-hidden">
            <div class="flex-1 flex items-center justify-center p-10 bg-[#050505]">
                <div class="w-full max-w-4xl aspect-video bg-black rounded-2xl border border-white/10 shadow-2xl relative">
                    <div class="absolute inset-0 flex items-center justify-center opacity-10">
                        <h1 class="text-8xl font-black italic">TRUELINE</h1>
                    </div>
                </div>
            </div>

            <div class="h-[300px] border-t border-white/10 bg-[#080808] p-4">
                <div class="flex gap-4 mb-4 text-[10px] font-bold text-zinc-600 uppercase">
                    <span class="text-blue-500">Timeline v4.0</span>
                    <span>00:00:14:02</span>
                </div>
                <div class="space-y-2 overflow-y-auto h-48">
                    <div class="h-10 bg-white/5 rounded border border-white/5 flex items-center px-4">
                        <div class="clip clip-video w-64">CORE_SEQUENCE.mp4</div>
                    </div>
                </div>
            </div>
        </main>

        <aside class="glass-panel p-6 border-l border-white/5">
            <h2 class="text-[10px] font-bold text-zinc-500 uppercase mb-8">Properties</h2>
            <div class="space-y-6">
                <div class="group">
                    <label class="text-[10px] text-zinc-500 block mb-2">Opacity</label>
                    <input type="range" class="w-full accent-blue-600 bg-zinc-800">
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { UI } from './js/ui-controller.js';
        
        // Contoh trigger halaman mengambang
        document.getElementById('btn-settings').onclick = () => {
            UI.createWindow('System Settings', `
                <div class="space-y-4">
                    <p>Engine: V8 Production</p>
                    <button class="w-full py-2 bg-blue-600 rounded text-white font-bold">Restart OS</button>
                </div>
            `);
        };

        document.getElementById('btn-assets').onclick = () => {
            UI.createWindow('Global Assets', '<p>No external assets linked yet.</p>');
        };
    </script>
</body>
</html>
