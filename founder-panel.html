<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Founder Panel - TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0a0a0a] text-white p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-2">Founder Dashboard</h1>
        <p class="text-gray-500 mb-10">Monitoring Pendapatan & User TRUELINE</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
            <div class="bg-[#161616] p-8 rounded-3xl border border-white/5">
                <p class="text-xs text-gray-500 uppercase font-bold">Cuan Bersih</p>
                <p class="text-3xl font-black text-emerald-400">Rp 12.450.000</p>
            </div>
            <div class="bg-[#161616] p-8 rounded-3xl border border-white/5">
                <p class="text-xs text-gray-500 uppercase font-bold">User Premium</p>
                <p class="text-3xl font-black">128</p>
            </div>
            <div class="bg-[#161616] p-8 rounded-3xl border border-white/5 text-indigo-400">
                <p class="text-xs text-gray-500 uppercase font-bold">Status Server</p>
                <p class="text-3xl font-black italic">Stabil</p>
            </div>
        </div>
        
        <div class="bg-[#161616] rounded-3xl overflow-hidden border border-white/5">
            <div class="p-6 bg-white/5 font-bold">Log Transaksi Terbaru</div>
            <div class="p-6 text-sm text-gray-400">Menunggu data dari Midtrans...</div>
        </div>
    </div>
</body>
</html>
