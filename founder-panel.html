<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Founder Panel | TRUELINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; visibility: hidden; }
    </style>
</head>
<body>
    
    <div id="content" class="max-w-5xl mx-auto p-10">
        <div class="border-b border-white/10 pb-6 mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black italic text-blue-600 tracking-tighter">FOUNDER CENTRAL</h1>
                <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em]">Restricted Access • System v2.0</p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="bg-white/5 px-4 py-2 rounded text-[10px] font-bold hover:bg-red-600 transition">SECURE LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-[#111] p-6 rounded-2xl border border-white/5">
                <p class="text-gray-500 text-[10px] font-bold mb-1">USER ACTIVITY</p>
                <p class="text-3xl font-black">2.4k</p>
            </div>
            <div class="bg-[#111] p-6 rounded-2xl border border-white/5">
                <p class="text-gray-500 text-[10px] font-bold mb-1">SERVER HEALTH</p>
                <p class="text-3xl font-black text-green-500">OPTIMAL</p>
            </div>
            <div class="bg-[#111] p-6 rounded-2xl border border-white/5">
                <p class="text-gray-500 text-[10px] font-bold mb-1">STORAGE USED</p>
                <p class="text-3xl font-black text-blue-500">14%</p>
            </div>
        </div>

        <div class="bg-[#111] p-6 rounded-2xl border border-white/5 font-mono text-[11px] text-gray-500">
            <p class="mb-2 text-blue-500 font-bold tracking-widest uppercase underline underline-offset-4">Live Forensic Logs:</p>
            <p>> Initializing TRUELINE Kernel...</p>
            <p>> Syncing Global CDN Assets...</p>
            <p>> Secure Connection Established.</p>
            <p class="animate-pulse text-green-600">> Monitoring Node-01 activity...</p>
        </div>
    </div>

    <script>
        // MASUKKAN PASSWORD DI SINI (Contoh: founder2026)
        const KUNCI = "founder2026";
        
        let login = prompt("ENTER FOUNDER ACCESS KEY:");

        if (login === KUNCI) {
            // Jika benar, tampilkan halaman
            document.body.style.visibility = "visible";
        } else {
            // Jika salah, tendang balik ke halaman depan
            alert("ACCESS DENIED! Invalid Key.");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
