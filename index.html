<!DOCTYPE html>
<html>
<head>
  <title>Trueline Login</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:120px;">

  <h1>🎬 TRUELINE</h1>
  <p>Login untuk masuk editor</p>

  <button onclick="loginGoogle()">Login dengan Google</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    // 🔥 FIREBASE CONFIG KAMU
    const firebaseConfig = {
      apiKey: "AIzaSyAWqV29Xz1I4P0lYYEFzt1QV9wcUhfGqxM",
      authDomain: "trueline-19ae3.firebaseapp.com",
      projectId: "trueline-19ae3",
      storageBucket: "trueline-19ae3.firebasestorage.app",
      messagingSenderId: "753238069219",
      appId: "1:753238069219:web:e182d8aec00e5843fe5ad6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // 🔑 LOGIN GOOGLE
    window.loginGoogle = async function () {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        alert("Login error: " + e.message);
        console.log(e);
      }
    };

    // 🔁 kalau sudah login langsung ke dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "dashboard.html";
      }
    });
  </script>

</body>
</html>
