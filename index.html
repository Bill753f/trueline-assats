<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUELINE | Creative Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .gradient-text { background: linear-gradient(90deg, #2563eb, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .capcut-card { background: #1a1a1a; border-radius: 12px; transition: 0.3s; border: 1px solid transparent; }
        .capcut-card:hover { border-color: #2563eb; transform: translateY(-4px); }
    </style>
</head>
<body>
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/5 sticky top-0 bg-[#0a0a0a]/90 backdrop-blur-md z-50">
        <div class="flex items-center space-x-10">
            <div class="text-2xl font-black tracking-tighter italic">TRUELINE</div>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-400">
                <a href="templates.html" class="hover:text-white transition">Templates</a>
                <a href="#" class="hover:text-white transition">Magic Tools</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="window.location.href='dashboard.html'" class="text-sm font-bold">Log in</button>
            <button onclick="window.location.href='dashboard.html'" class="bg-blue-600 px-6 py-2 rounded-full text-sm font-bold">Sign up free</button>
        </div>
    </nav>

    <header class="py-20 px-8 text-center">
        <h1 class="text-6xl md:text-7xl font-black mb-6 leading-tight">Create your <br><span class="gradient-text">Masterpiece.</span></h1>
        <p class="text-gray-400 text-lg mb-10 max-w-2xl mx-auto">Platform cerdas untuk otomasi konten dan riset kreatif dengan standar produksi tinggi.</p>
        <button onclick="window.location.href='dashboard.html'" class="bg-white text-black px-12 py-4 rounded-lg font-bold text-lg hover:bg-blue-500 hover:text-white transition">Get Started Free</button>
    </header>

    <section class="px-8 max-w-7xl mx-auto pb-20">
        <h2 class="text-xl font-bold mb-8 italic border-l-4 border-blue-600 pl-4">Recommended Templates</h2>
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="capcut-card aspect-[9/16] bg-blue-900/10"></div>
            <div class="capcut-card aspect-[9/16] bg-purple-900/10"></div>
            <div class="capcut-card aspect-[9/16] bg-gray-900"></div>
            <div class="capcut-card aspect-[9/16] bg-blue-900/10"></div>
            <div class="capcut-card aspect-[9/16] bg-purple-900/10"></div>
        </div>
    </section>
</body>
</html>
