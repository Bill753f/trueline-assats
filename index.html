<!DOCTYPE html>
<html>
<head>
  <title>Trueline Editor</title>

  <script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>

  <style>
    body { margin:0; display:flex; height:100vh; background:#181818; color:white; font-family:Arial;}
    #sidebar { width:220px; background:#111; padding:15px;}
    button { width:100%; margin:5px 0; padding:10px; background:#333; color:white; border:none;}
    #canvas { flex:1; background:#222; position:relative;}
    .text-box { position:absolute; background:white; color:black; padding:5px;}
    #timeline { height:80px; background:#111; display:flex; padding:10px;}
    .slide { width:60px; height:40px; background:#444; margin-right:5px; display:flex; align-items:center; justify-content:center;}
  </style>
</head>

<body>

<div id="sidebar">
  <h3>🎬 Trueline</h3>

  <div id="status">Belum login</div>

  <button id="loginBtn">Login Google</button>

  <hr>

  <button id="addTextBtn">+ Text</button>
  <button id="newSlideBtn">+ Slide</button>

  <button id="saveBtn">💾 Save Online</button>
  <button id="loadBtn">📂 Load Online</button>
</div>

<div style="flex:1; display:flex; flex-direction:column;">
  <div id="canvas"></div>
  <div id="timeline"></div>
</div>

<script type="module">

// 🔥 FIREBASE (VERSI STABIL)
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAWqV29Xz1I4P0lYYEFzt1QV9wcUhfGqxM",
  authDomain: "trueline-19ae3.firebaseapp.com",
  projectId: "trueline-19ae3",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 LOGIN FIX (STABIL)
let currentUser = null;

document.getElementById("loginBtn").onclick = () => {
  const provider = new GoogleAuthProvider();
  signInWithRedirect(auth, provider);
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("status").innerText = "Login: " + user.email;
  }
});

// 🎬 EDITOR
let slides = [[]];
let currentSlide = 0;

function render() {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  slides[currentSlide].forEach((item, i) => {
    let div = document.createElement("div");
    div.className = "text-box";
    div.contentEditable = true;
    div.innerText = item.text;
    div.style.left = item.x + "px";
    div.style.top = item.y + "px";

    div.oninput = () => slides[currentSlide][i].text = div.innerText;

    canvas.appendChild(div);
  });

  renderTimeline();
}

document.getElementById("addTextBtn").onclick = () => {
  slides[currentSlide].push({ text: "edit", x: 50, y: 50 });
  render();
};

document.getElementById("newSlideBtn").onclick = () => {
  slides.push([]);
  currentSlide = slides.length - 1;
  render();
};

function renderTimeline() {
  let t = document.getElementById("timeline");
  t.innerHTML = "";

  slides.forEach((_, i) => {
    let d = document.createElement("div");
    d.className = "slide";
    d.innerText = i + 1;
    d.onclick = () => { currentSlide = i; render(); };
    t.appendChild(d);
  });
}

// ☁️ SAVE
document.getElementById("saveBtn").onclick = async () => {
  if (!currentUser) return alert("Login dulu!");

  await setDoc(doc(db, "projects", currentUser.uid), {
    slides: slides
  });

  alert("Saved!");
};

// 📂 LOAD
document.getElementById("loadBtn").onclick = async () => {
  if (!currentUser) return alert("Login dulu!");

  const snap = await getDoc(doc(db, "projects", currentUser.uid));

  if (snap.exists()) {
    slides = snap.data().slides;
    render();
  }
};

render();

</script>

</body>
</html>
