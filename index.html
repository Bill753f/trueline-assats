<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUELINE | Next-Gen Content Orchestrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; letter-spacing: -0.02em; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 p-5 flex justify-between items-center glass">
        <div class="text-2xl font-black tracking-tighter gradient-text">TRUELINE</div>
        <div class="hidden md:flex space-x-10 text-xs font-bold uppercase tracking-widest text-gray-500">
            <a href="#" class="hover:text-white transition">Engine</a>
            <a href="#" class="hover:text-white transition">Assets</a>
            <a href="founder-panel.html" class="hover:text-indigo-400 transition">Founder</a>
        </div>
        <button onclick="window.location.href='dashboard.html'" class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold hover:invert transition">
            DASHBOARD
        </button>
    </nav>

    <section class="relative pt-48 pb-32 px-6 text-center">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-96 bg-indigo-500/20 blur-[120px] -z-10"></div>
        
        <h1 class="text-6xl md:text-8xl font-black mb-8 leading-[0.9] tracking-tighter">
            PRODUCTION-GRADE <br> <span class="gradient-text">RESEARCH ENGINE.</span>
        </h1>
        <p class="text-gray-400 max-w-2xl mx-auto mb-12 text-lg md:text-xl font-light">
            Automate your creative workflow with our high-fidelity orchestration system. Built for speed, reliability, and precision.
        </p>
        
        <div class="flex flex-col md:flex-row justify-center items-center gap-5">
            <button onclick="window.location.href='dashboard.html'" class="w-full md:w-auto bg-indigo-600 px-12 py-5 rounded-2xl font-bold text-lg hover:bg-indigo-500 transition shadow-xl shadow-indigo-500/20">
                Get Started
            </button>
            <button class="w-full md:w-auto glass px-10 py-5 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 hover:bg-white/5 transition">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" class="w-5 h-5">
                Login with Google
            </button>
        </div>
    </section>
</body>
</html>
