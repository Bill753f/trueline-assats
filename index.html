<!DOCTYPE html>
<html>
<head>
  <title>Trueline Editor</title>

  <script src="https://unpkg.com/pptxgenjs/dist/pptxgen.bundle.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      height: 100vh;
      background: #181818;
      color: white;
    }

    #sidebar {
      width: 220px;
      background: #111;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    button {
      margin: 5px 0;
      padding: 10px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #555;
    }

    #canvas {
      flex: 1;
      background: #222;
      position: relative;
    }

    .text-box {
      position: absolute;
      background: white;
      color: black;
      padding: 5px;
      resize: both;
      overflow: auto;
      cursor: move;
    }

    img {
      position: absolute;
      resize: both;
      cursor: move;
    }

    #timeline {
      height: 90px;
      background: #111;
      display: flex;
      padding: 10px;
      overflow-x: auto;
    }

    .slide {
      width: 70px;
      height: 50px;
      background: #444;
      margin-right: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .active {
      background: #00aaff;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>🎬 Trueline</h3>

  <button onclick="addText()">+ Text</button>
  <button onclick="addImage()">+ Image</button>
  <button onclick="newSlide()">+ Slide</button>

  <button onclick="saveProject()">💾 Save</button>
  <button onclick="loadProject()">📂 Load</button>

  <button onclick="exportPPT()">⬇ PPT</button>
  <button onclick="exportVideo()">🎬 Video</button>

  <input type="range" min="12" max="50" onchange="changeFont(this.value)">
  <input type="color" onchange="changeColor(this.value)">
</div>

<div style="flex:1; display:flex; flex-direction:column;">
  <div id="canvas"></div>
  <div id="timeline"></div>
</div>

<script>
let slides = [[]];
let currentSlide = 0;
let selectedIndex = null;

// RENDER
function render() {
  const canvas = document.getElementById("canvas");
  canvas.innerHTML = "";

  slides[currentSlide].forEach((item, index) => {

    if (item.type === "image") {
      const img = document.createElement("img");
      img.src = item.src;
      img.style.left = item.x + "px";
      img.style.top = item.y + "px";
      img.style.width = item.width + "px";

      img.onclick = () => selectedIndex = index;

      makeDraggable(img, index);
      canvas.appendChild(img);
      return;
    }

    const div = document.createElement("div");
    div.className = "text-box";
    div.contentEditable = true;
    div.innerText = item.text;
    div.style.left = item.x + "px";
    div.style.top = item.y + "px";
    div.style.fontSize = item.size + "px";
    div.style.color = item.color;

    div.onclick = () => selectedIndex = index;

    div.oninput = () => {
      slides[currentSlide][index].text = div.innerText;
    };

    makeDraggable(div, index);
    canvas.appendChild(div);
  });

  renderTimeline();
}

// ADD
function addText() {
  slides[currentSlide].push({
    text: "Edit text",
    x: 50,
    y: 50,
    size: 20,
    color: "#000000"
  });
  render();
}

function addImage() {
  const url = prompt("Masukkan URL gambar:");
  if (!url) return;

  slides[currentSlide].push({
    type: "image",
    src: url,
    x: 50,
    y: 50,
    width: 120
  });

  render();
}

// STYLE
function changeFont(size) {
  if (selectedIndex === null) return;
  slides[currentSlide][selectedIndex].size = size;
  render();
}

function changeColor(color) {
  if (selectedIndex === null) return;
  slides[currentSlide][selectedIndex].color = color;
  render();
}

// SLIDE
function newSlide() {
  slides.push([]);
  currentSlide = slides.length - 1;
  render();
}

function renderTimeline() {
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  slides.forEach((_, i) => {
    const div = document.createElement("div");
    div.className = "slide " + (i === currentSlide ? "active" : "");
    div.innerText = i + 1;

    div.onclick = () => {
      currentSlide = i;
      render();
    };

    timeline.appendChild(div);
  });
}

// DRAG
function makeDraggable(el, index) {
  let offsetX, offsetY;

  el.onmousedown = function(e) {
    offsetX = e.clientX - el.offsetLeft;
    offsetY = e.clientY - el.offsetTop;

    document.onmousemove = function(e) {
      el.style.left = (e.clientX - offsetX) + "px";
      el.style.top = (e.clientY - offsetY) + "px";

      slides[currentSlide][index].x = el.offsetLeft;
      slides[currentSlide][index].y = el.offsetTop;
    };

    document.onmouseup = function() {
      document.onmousemove = null;
    };
  };
}

// SAVE
function saveProject() {
  localStorage.setItem("trueline_project", JSON.stringify(slides));
  alert("Saved!");
}

function loadProject() {
  const data = localStorage.getItem("trueline_project");
  if (!data) return alert("No project!");

  slides = JSON.parse(data);
  currentSlide = 0;
  render();
}

// AUTO SAVE
setInterval(() => {
  localStorage.setItem("trueline_project", JSON.stringify(slides));
}, 3000);

// EXPORT PPT
function exportPPT() {
  let pptx = new PptxGenJS();

  slides.forEach(slideData => {
    let slide = pptx.addSlide();

    slideData.forEach(item => {
      if (item.type === "image") {
        slide.addImage({ path: item.src, x: item.x/100, y: item.y/100, w: 2 });
      } else {
        slide.addText(item.text, {
          x: item.x/100,
          y: item.y/100,
          fontSize: item.size,
          color: item.color.replace("#","")
        });
      }
    });
  });

  pptx.writeFile("trueline.pptx");
}

// EXPORT VIDEO
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

async function exportVideo() {
  alert("Processing...");

  await ffmpeg.load();

  const canvasEl = document.getElementById("canvas");
  const dataUrl = await html2canvas(canvasEl).then(c => c.toDataURL());

  ffmpeg.FS('writeFile', 'frame.png', await fetchFile(dataUrl));

  await ffmpeg.run('-loop','1','-i','frame.png','-t','3','output.mp4');

  const data = ffmpeg.FS('readFile','output.mp4');
  const url = URL.createObjectURL(new Blob([data.buffer]));

  window.open(url);
}

render();
</script>

</body>
</html>
